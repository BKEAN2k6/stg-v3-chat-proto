name: CI

on:
  pull_request:
    branches: [ "main" ]

  push:
    branches-ignore: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x]
       
    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - name: "Install"
      run: npm ci
    - name: "Lint"
      run: npm run lint
    - name: "Build"
      run: npm run build
    - name: "Test"
      run: npm run test
      env:
        NODE_OPTIONS: "--max_old_space_size=4096"
