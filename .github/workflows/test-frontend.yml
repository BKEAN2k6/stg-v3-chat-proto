name: Test Frontend

on:
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        cache-dependency-path: package-lock.json
        node-version: 24
        cache: 'npm'
    - name: "Install"
      run: npm ci
    - name: "Lint"
      working-directory: frontend
      run: npm run lint:nofix
    - name: "Build"
      working-directory: frontend
      run: npm run build
    - name: "Test"
      working-directory: frontend
      run: npm run test
