name: 'Deploy staging'

on:
  push:
    branches:
      - main

jobs:
  deploy-data-api:
    runs-on: ubuntu-latest
    env:
      deploy-data-api-dir: ./

    steps:
      - uses: actions/checkout@v2
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy Data API
        working-directory: ${{ env.deploy-data-api-dir }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run:  flyctl deploy -c fly.staging.toml --wait-timeout 300