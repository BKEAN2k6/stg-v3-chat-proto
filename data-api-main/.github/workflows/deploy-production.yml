name: "Deploy production"

on:
  push:
    branches:
      - production

jobs:
  deploy-data-api:
    runs-on: ubuntu-latest
    env:
      deploy-data-api-dir: ./

    steps:
      - uses: actions/checkout@v2
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Set up node
        uses: actions/setup-node@v1
        with:
          node-version: "19.x"

      - name: Install Yarn
        run: npm install -g yarn

      - name: Deploy Data API
        working-directory: ${{ env.deploy-data-api-dir }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy -c fly.production.toml --wait-timeout 300