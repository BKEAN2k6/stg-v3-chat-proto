<!doctype html>
<html lang="en" style="height: 100%">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/images/icons/favicon.ico">
    <link rel="shortcut icon" href="/images/icons/favicon-16x16.png">
    <link rel="apple-touch-icon" href="/images/icons/apple-touch-icon.png">
    <script>
      localStorage.removeItem('umami.disabled');
    </script>
    <style>
      @keyframes root-loader {
        33% {
          transform: translateY(10px);
        }
        66% {
          transform: translateY(-10px);
        } 100% {
          transform: translateY(0px);
        }
      }
      .root-loader-container {
        position: absolute;
        left: 50%;
        top: 50%;
        -webkit-transform: translate(-50%, -50%);
        transform: translate(-50%, -50%);
      }
      .root-loader-dot {
        background-color: rgb(204, 204, 204); width: 10px; height: 10px; margin: 2px; border-radius: 100%; display: inline-block;
      }
      #first.root-loader-dot {
        animation: 0.6s ease-in-out 0.07s infinite normal both running root-loader;
      }
      #second.root-loader-dot {
        animation: 0.6s ease-in-out 0.14s infinite normal both running root-loader;
      }
      #third.root-loader-dot {
        animation: 0.6s ease-in-out 0.21s infinite normal both running root-loader;
      }
    </style>
    <script defer src="/analytics/script.js" data-website-id="%VITE_UMAMI_WEBSITE_ID%" data-auto-track="false"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>See the Good!</title>
  </head>
  <body style="height: 100%">
    <div id="root" style="height: 100%">
      <span class="root-loader-container">
        <span class="root-loader-dot" id="first"></span>
        <span class="root-loader-dot" id="second"></span>
        <span class="root-loader-dot" is="third"></span>
      </span>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
