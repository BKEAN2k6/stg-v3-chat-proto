name: CI

on:
  pull_request:
    branches: ["main"]

jobs:
  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          cache-dependency-path: package-lock.json
          node-version: 24
          cache: "npm"
      - run: npm ci
      - working-directory: frontend
        run: npm run lint:nofix

  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          cache-dependency-path: package-lock.json
          node-version: 24
          cache: "npm"
      - run: npm ci
      - working-directory: backend
        run: npm run lint:nofix

  typecheck-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          cache-dependency-path: package-lock.json
          node-version: 24
          cache: "npm"
      - run: npm ci
      - working-directory: frontend
        run: npm run typecheck

  typecheck-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          cache-dependency-path: package-lock.json
          node-version: 24
          cache: "npm"
      - run: npm ci
      - working-directory: backend
        run: npm run typecheck

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          cache-dependency-path: package-lock.json
          node-version: 24
          cache: "npm"
      - run: npm ci
      - working-directory: frontend
        run: npm run test

  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          cache-dependency-path: package-lock.json
          node-version: 24
          cache: "npm"
      - run: npm ci
      - working-directory: backend
        run: npm run test
        env:
          NODE_OPTIONS: "--max_old_space_size=4096"
